<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Literary Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS/JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- PapaParse for CSV -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.1/css/all.min.css">

  <!-- Leaflet Awesome Markers -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.awesome-markers/2.0.4/leaflet.awesome-markers.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.awesome-markers/2.0.4/leaflet.awesome-markers.js"></script>

  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

  <style>
    html, body { height: 100%; margin:0; }
    #map { height: 100%; }

    .layer-toggle {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      padding: 5px 10px;
      border-radius: 4px;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      cursor: pointer;
      z-index: 1000;
    }

    @media (max-width: 768px) {
      .leaflet-control-layers-expanded { display: none !important; }
    }
  </style>
</head>

<body>
<div id="map"></div>
<div class="layer-toggle">Layers &#9776;</div>

<script>
  var map = L.map('map').setView([35.2, -111.7], 7);

  // Basemaps
  var street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
  var topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenTopoMap' });

  var baseMaps = { "Street": street, "Topo": topo };

  // Cluster group for points
  var markersCluster = L.markerClusterGroup();

  // Load Points.csv
  Papa.parse('./csv/Points.csv', {
    download: true,
    header: true,
    dynamicTyping: true,
    complete: function(results) {
      results.data.forEach(function(row) {
        if (!row.Latitude || !row.Longitude) return;

        // Create custom marker icon
        var icon = L.AwesomeMarkers.icon({
          icon: row['Marker Icon'] || 'book',
          markerColor: row['Marker Color'] || 'blue',
          prefix: 'fa',
          iconColor: row['Icon Color'] || 'white',
          extraClasses: row['Custom Size'] || ''
        });

        var popupContent = `<strong>${row.Name || ''}</strong><br>
                            ${row.Description || ''}<br>
                            <img src="${row.Image || ''}" style="max-width:150px;">`;

        var marker = L.marker([row.Latitude, row.Longitude], {icon: icon})
                      .bindPopup(popupContent);

        markersCluster.addLayer(marker);
      });

      map.addLayer(markersCluster);
    },
    error: function(err) {
      console.error("Error loading CSV:", err);
    }
  });

  // Layer control
  var overlayMaps = { "Points": markersCluster };
  var layerControl = L.control.layers(baseMaps, overlayMaps).addTo(map);

  // Mobile toggle
  document.querySelector('.layer-toggle').addEventListener('click', function() {
    var ctrl = document.querySelector('.leaflet-control-layers-expanded');
    ctrl.style.display = (ctrl.style.display === 'block') ? 'none' : 'block';
  });
</script>
</body>
</html>
